name: el_gustazo
description: Aplicación móvil para gestión de pedidos, inventario y ganancias de "EL GUSTAZO"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Estado
  provider: ^6.1.1
  
  # Persistencia Local (Mejora 1)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # PDF y Exportación (Mejora 2)
  pdf: ^3.10.7
  printing: ^5.11.1
  csv: ^5.1.1
  share_plus: ^7.2.1
  
  # Firebase / Cloud Backup (Mejora 6)
  firebase_core: ^2.24.0
  cloud_firestore: ^4.14.0
  
  # UI & Iconos
  cupertino_icons: ^1.0.6
  fl_chart: ^0.65.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.7
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
